apiVersion: dcontroller.io/v1alpha1
kind: Operator
metadata:
  name: matrixrtc-matrix-views-to-k8s
  labels:
    matrixrtc.lukacsi.org/component: operator
    matrixrtc.lukacsi.org/role: matrix-materializer
spec:
  controllers:
    # --- SYNAPSE CONFIG (homeserver.yaml generation via @concat) ---
    # 3-source join: ServerView + NetworkingView + DB Secret.
    # DB credentials embedded directly from Secret.data (DecodeSecretData).
    # For managed DB: fires after CNPG creates the app secret (natural sequencing).
    # For external DB: fires immediately since user-provided secret already exists.
    - name: synapse-config-generator
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixServerView
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
        - apiGroup: ""
          kind: Secret
      pipeline:
        - "@join":
            "@and":
              - "@eq": ["$.MatrixServerView.metadata.name", "$.MatrixNetworkingView.metadata.name"]
              - "@eq": ["$.MatrixServerView.metadata.namespace", "$.MatrixNetworkingView.metadata.namespace"]
              - "@eq": ["$.MatrixServerView.spec.database.effectiveSecretName", "$.Secret.metadata.name"]
              - "@eq": ["$.MatrixServerView.metadata.namespace", "$.Secret.metadata.namespace"]
        - "@project":
            apiVersion: v1
            kind: Secret
            metadata:
              name: synapse-config
              namespace: "$.MatrixServerView.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/stack: "$.MatrixServerView.spec.stack"
                matrixrtc.lukacsi.org/component: synapse
                matrixrtc.lukacsi.org/view: "$.MatrixServerView.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            stringData:
              homeserver.yaml:
                "@concat":
                  - "server_name: \""
                  - "$.MatrixServerView.spec.synapse.serverName"
                  - "\"\n"
                  - "public_baseurl: \"https://"
                  - "$.MatrixNetworkingView.spec.host"
                  - "\"\n"
                  - "signing_key_path: \"/data/keys/"
                  - "$.MatrixServerView.spec.synapse.signingKey.signingKeyKey"
                  - "\"\n\n"
                  - "listeners:\n"
                  - "  - port: 8008\n"
                  - "    type: http\n"
                  - "    tls: false\n"
                  - "    x_forwarded: true\n"
                  - "    resources:\n"
                  - "      - names: [client, federation]\n"
                  - "        compress: false\n\n"
                  - "database:\n"
                  - "  name: psycopg2\n"
                  - "  args:\n"
                  - "    user: \""
                  - "$.Secret.data['username']"
                  - "\"\n"
                  - "    password: \""
                  - "$.Secret.data['password']"
                  - "\"\n"
                  - "    database: \""
                  - "$.MatrixServerView.spec.database.effectiveName"
                  - "\"\n"
                  - "    host: \""
                  - "$.MatrixServerView.spec.database.effectiveHost"
                  - "\"\n"
                  - "    port: "
                  - "@string": "$.MatrixServerView.spec.database.effectivePort"
                  - "\n"
                  - "    cp_min: 5\n"
                  - "    cp_max: 10\n\n"
                  - "media_store_path: \"/data/media_store\"\n"
                  - "uploads_path: \"/data/uploads\"\n"
                  - "enable_registration: false\n"
                  # registration_shared_secret: reuses DB password (CNPG-generated, 64 chars).
                  # dcontroller can't join two Secrets of the same kind in one pipeline —
                  # a separate registration Secret would require $.Secret disambiguation
                  # which isn't supported. The DB password is strong and unique per deployment.
                  - "registration_shared_secret: \""
                  - "$.Secret.data['password']"
                  - "\"\n"
                  - "report_stats: false\n"
                  # OIDC — conditional block, only included when oidc.enabled=true
                  - "@cond":
                      - "@eq": ["$.MatrixServerView.spec.synapse.oidc.enabled", true]
                      - "@concat":
                          - "\noidc_providers:\n"
                          - "  - idp_id: \""
                          - "@definedOr": ["$.MatrixServerView.spec.synapse.oidc.idpId", "authentik"]
                          - "\"\n"
                          - "    idp_name: \""
                          - "@definedOr": ["$.MatrixServerView.spec.synapse.oidc.idpName", "Authentik"]
                          - "\"\n"
                          - "    discover: true\n"
                          - "    issuer: \""
                          - "$.MatrixServerView.spec.synapse.oidc.issuer"
                          - "\"\n"
                          - "    client_id: \""
                          - "$.MatrixServerView.spec.synapse.oidc.clientId"
                          - "\"\n"
                          - "    client_secret_path: \"/secrets/oidc/client-secret\"\n"
                          - "    scopes:\n"
                          - "      - \"openid\"\n"
                          - "      - \"profile\"\n"
                          - "      - \"email\"\n"
                          - "    user_mapping_provider:\n"
                          - "      config:\n"
                          - "        localpart_template: \""
                          - "@definedOr": ["$.MatrixServerView.spec.synapse.oidc.userMapping.localpartTemplate", "{{`{{ user.preferred_username }}`}}"]
                          - "\"\n"
                          - "        display_name_template: \""
                          - "@definedOr": ["$.MatrixServerView.spec.synapse.oidc.userMapping.displayNameTemplate", "{{`{{ user.name }}`}}"]
                          - "\"\n"
                      - "@concat": []
                  # Rate limiting — relaxed for personal/small homeserver
                  - "\nrc_joins:\n"
                  - "  local:\n"
                  - "    per_second: 50\n"
                  - "    burst_count: 100\n"
                  - "  remote:\n"
                  - "    per_second: 50\n"
                  - "    burst_count: 100\n"
                  - "rc_message:\n"
                  - "  per_second: 100\n"
                  - "  burst_count: 200\n"
                  - "rc_registration:\n"
                  - "  per_second: 50\n"
                  - "  burst_count: 100\n"
                  # MatrixRTC — serve well-known with LiveKit foci for Element Call
                  - "\nserve_client_wellknown: true\n"
                  - "extra_well_known_client_content:\n"
                  - "  \"org.matrix.msc4143.rtc_foci\":\n"
                  - "    - type: \"livekit\"\n"
                  - "      livekit_service_url: \"https://"
                  - "$.MatrixNetworkingView.spec.bridge.jwtServiceHost"
                  - "\"\n"
      target:
        apiGroup: ""
        kind: Secret
        type: Updater

    # --- SYNAPSE DATA PVC ---
    # Persistent storage for media_store and uploads. PVC is immutable after
    # creation — Updater creates once, subsequent reconciliations are no-ops.
    - name: synapse-data-pvc
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixServerView
          predicate: GenerationChanged
      pipeline:
        - "@project":
            apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: synapse-data
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/component: synapse
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: "10Gi"
      target:
        apiGroup: ""
        kind: PersistentVolumeClaim
        type: Updater

    # --- SYNAPSE DEPLOYMENT ---
    # Joins ServerView + config Secret for @hash rollout trigger.
    - name: server-view-to-synapse-deployment
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixServerView
        - apiGroup: ""
          kind: Secret
      pipeline:
        - "@join":
            "@and":
              - "@eq": ["synapse-config", "$.Secret.metadata.name"]
              - "@eq": ["$.MatrixServerView.metadata.namespace", "$.Secret.metadata.namespace"]
        - "@project":
            apiVersion: "apps/v1"
            kind: "Deployment"
            metadata:
              name: "synapse"
              namespace: "$.MatrixServerView.metadata.namespace"
              labels:
                app: "synapse"
                matrixrtc.lukacsi.org/stack: "$.MatrixServerView.spec.stack"
                matrixrtc.lukacsi.org/component: synapse
                matrixrtc.lukacsi.org/view: "$.MatrixServerView.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              replicas:
                "@definedOr": ["$.MatrixServerView.spec.synapse.replicas", 1]
              selector:
                matchLabels: { app: "synapse" }
              template:
                metadata:
                  labels:
                    app: "synapse"
                    matrixrtc.lukacsi.org/stack: "$.MatrixServerView.spec.stack"
                    matrixrtc.lukacsi.org/component: synapse
                    matrixrtc.lukacsi.org/view: "$.MatrixServerView.metadata.name"
                    app.kubernetes.io/managed-by: matrix-rtc-operator
                  annotations:
                    matrixrtc.lukacsi.org/config-hash:
                      "@hash": "$.Secret.data"
                spec:
                  # Init container: discovers appservice registration files
                  # and generates a supplementary Synapse config listing them.
                  # Runs always — produces empty config ({}) when no appservices.
                  initContainers:
                    - name: appservice-discovery
                      image: "busybox:1.37"
                      command: ["/bin/sh", "-c"]
                      args:
                        - "if ls /appservices/*.yaml 1>/dev/null 2>&1; then echo 'app_service_config_files:' > /config-extra/appservices.yaml; for f in /appservices/*.yaml; do echo \"  - $f\" >> /config-extra/appservices.yaml; done; else echo '{}' > /config-extra/appservices.yaml; fi"
                      volumeMounts:
                        - name: appservices
                          mountPath: /appservices
                          readOnly: true
                        - name: config-extra
                          mountPath: /config-extra
                  containers:
                    - name: synapse
                      image: "$.MatrixServerView.spec.synapse.image"
                      # Bypass /start.py — load main config + appservice config
                      command: ["python", "-m", "synapse.app.homeserver"]
                      args: ["--config-path", "/config/homeserver.yaml", "--config-path", "/config-extra/appservices.yaml"]
                      ports:
                        - name: http
                          containerPort: 8008
                      resources: "$.MatrixServerView.spec.synapse.resources"
                      livenessProbe:
                        httpGet:
                          path: /health
                          port: 8008
                        initialDelaySeconds: 30
                        periodSeconds: 30
                        timeoutSeconds: 10
                      readinessProbe:
                        httpGet:
                          path: /health
                          port: 8008
                        initialDelaySeconds: 5
                        periodSeconds: 10
                        timeoutSeconds: 5
                      volumeMounts:
                        - name: config
                          mountPath: /config
                          readOnly: true
                        - name: signing-key
                          mountPath: /data/keys
                          readOnly: true
                        - name: data
                          mountPath: /data
                        - name: oidc-secret
                          mountPath: /secrets/oidc
                          readOnly: true
                        - name: appservices
                          mountPath: /appservices
                          readOnly: true
                        - name: config-extra
                          mountPath: /config-extra
                          readOnly: true
                  volumes:
                    - name: config
                      secret:
                        secretName: "synapse-config"
                    - name: signing-key
                      secret:
                        secretName: "$.MatrixServerView.spec.synapse.signingKey.existingSecret"
                    - name: data
                      persistentVolumeClaim:
                        claimName: synapse-data
                    - name: oidc-secret
                      secret:
                        secretName:
                          "@definedOr":
                            - "$.MatrixServerView.spec.synapse.oidc.clientSecret.existingSecret"
                            - "synapse-oidc-unused"
                        optional: true
                    - name: appservices
                      secret:
                        secretName:
                          "@definedOr":
                            - "$.MatrixServerView.spec.synapse.appservices.registrationsSecret"
                            - "synapse-appservice-registrations-unused"
                        optional: true
                    - name: config-extra
                      emptyDir: {}
      target:
        apiGroup: "apps"
        kind: "Deployment"
        type: Updater

    # --- CNPG CLUSTER (managed database only) ---
    - name: server-view-to-cnpg-cluster
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixServerView
          predicate: GenerationChanged
      pipeline:
        - "@select":
            "@eq": ["$.spec.database.mode", "managed"]
        - "@project":
            apiVersion: "postgresql.cnpg.io/v1"
            kind: "Cluster"
            metadata:
              name:
                "@concat": ["$.spec.stack", "-db"]
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/component: database
                matrixrtc.lukacsi.org/view: "$.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              instances:
                "@definedOr": ["$.spec.database.instances", 1]
              storage:
                size:
                  "@definedOr": ["$.spec.database.storage.size", "10Gi"]
              bootstrap:
                initdb:
                  database:
                    "@definedOr": ["$.spec.database.effectiveName", "synapse"]
                  owner: synapse
      target:
        apiGroup: "postgresql.cnpg.io"
        kind: "Cluster"
        type: Updater

    # --- SYNAPSE SERVICE ---
    - name: networking-view-to-synapse-svc
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
          predicate: GenerationChanged
      pipeline:
        - "@project":
            apiVersion: "v1"
            kind: "Service"
            metadata:
              name: "synapse"
              namespace: "$.metadata.namespace"
              labels:
                app: "synapse"
                matrixrtc.lukacsi.org/component: synapse
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/view: "$.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              selector: { app: "synapse" }
              ports:
                - name: http
                  port: 8008
                  targetPort: 8008
      target:
        apiGroup: ""
        kind: "Service"
        type: Updater

    # --- SYNAPSE HTTPRoute ---
    - name: networking-view-to-synapse-httproute
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
          predicate: GenerationChanged
      pipeline:
        - "@project":
            apiVersion: gateway.networking.k8s.io/v1
            kind: "HTTPRoute"
            metadata:
              name: synapse
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/component: synapse-http
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/view: "$.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              parentRefs:
                - name: "$.spec.httpGatewayRef.name"
                  namespace: "$.spec.httpGatewayRef.namespace"
              hostnames: ["$.spec.host"]
              rules:
                - backendRefs:
                    - name: synapse
                      port: 8008
      target:
        apiGroup: gateway.networking.k8s.io
        kind: "HTTPRoute"
        type: Updater

    # --- ELEMENT WEB CONFIG (config.json via @concat) ---
    # 2-source join: ServerView (serverName) + NetworkingView (host, clients).
    # Conditional on clients.element.enabled.
    - name: element-config-generator
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixServerView
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@join":
            "@and":
              - "@eq": ["$.MatrixServerView.metadata.name", "$.MatrixNetworkingView.metadata.name"]
              - "@eq": ["$.MatrixServerView.metadata.namespace", "$.MatrixNetworkingView.metadata.namespace"]
        - "@select":
            "@eq": ["$.MatrixNetworkingView.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: element-config
              namespace: "$.MatrixNetworkingView.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/stack: "$.MatrixNetworkingView.spec.stack"
                matrixrtc.lukacsi.org/component: element
                matrixrtc.lukacsi.org/view: "$.MatrixNetworkingView.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            data:
              config.json:
                "@concat":
                  - "{\"default_server_config\":{\"m.homeserver\":{\"base_url\":\"https://"
                  - "$.MatrixNetworkingView.spec.host"
                  - "\",\"server_name\":\""
                  - "$.MatrixServerView.spec.synapse.serverName"
                  - "\"}},\"element_call\":{\"url\":\"https://call."
                  - "$.MatrixNetworkingView.spec.bridge.wellknownHost"
                  - "\",\"use_exclusively\":true},\"brand\":\"Element\",\"disable_custom_urls\":true,\"disable_guests\":true,\"features\":{\"feature_group_calls\":true,\"feature_video_rooms\":true,\"feature_element_call_video_rooms\":true}}"
      target:
        apiGroup: ""
        kind: ConfigMap
        type: Updater

    # --- ELEMENT WEB DEPLOYMENT ---
    # Single source: NetworkingView. @hash on spec triggers rollout when config changes.
    - name: element-deployment
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: element-web
              namespace: "$.metadata.namespace"
              labels:
                app: element-web
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/component: element
                matrixrtc.lukacsi.org/view: "$.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              replicas:
                "@definedOr": ["$.spec.clients.element.replicas", 1]
              selector:
                matchLabels: { app: element-web }
              template:
                metadata:
                  labels:
                    app: element-web
                    matrixrtc.lukacsi.org/stack: "$.spec.stack"
                    matrixrtc.lukacsi.org/component: element
                    matrixrtc.lukacsi.org/view: "$.metadata.name"
                    app.kubernetes.io/managed-by: matrix-rtc-operator
                  annotations:
                    matrixrtc.lukacsi.org/config-hash:
                      "@hash": "$.spec"
                spec:
                  containers:
                    - name: element
                      image: "$.spec.clients.element.image"
                      ports:
                        - name: http
                          containerPort: 80
                      resources: "$.spec.clients.element.resources"
                      volumeMounts:
                        - name: config
                          mountPath: /app/config.json
                          subPath: config.json
                          readOnly: true
                  volumes:
                    - name: config
                      configMap:
                        name: element-config
      target:
        apiGroup: apps
        kind: Deployment
        type: Updater

    # --- ELEMENT WEB SERVICE ---
    - name: element-service
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: v1
            kind: Service
            metadata:
              name: element-web
              namespace: "$.metadata.namespace"
              labels:
                app: element-web
                matrixrtc.lukacsi.org/component: element
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/view: "$.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              selector: { app: element-web }
              ports:
                - name: http
                  port: 80
                  targetPort: 80
      target:
        apiGroup: ""
        kind: Service
        type: Updater

    # --- ELEMENT WEB HTTPRoute ---
    - name: element-httproute
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: element
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/component: element-http
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/view: "$.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              parentRefs:
                - name: "$.spec.httpGatewayRef.name"
                  namespace: "$.spec.httpGatewayRef.namespace"
              hostnames: ["$.spec.clients.element.host"]
              rules:
                - backendRefs:
                    - name: element-web
                      port: 80
      target:
        apiGroup: gateway.networking.k8s.io
        kind: HTTPRoute
        type: Updater

    # =====================================================================
    # Element Call — self-hosted Element Call widget for MatrixRTC
    # Deployed at call.<domain>. Element Web embeds this as an iframe.
    # =====================================================================

    # --- ELEMENT CALL CONFIG ---
    - name: element-call-config
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: element-call-config
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/component: element-call
                app.kubernetes.io/managed-by: matrix-rtc-operator
            data:
              config.json:
                "@concat":
                  - "{\"livekit\":{\"livekit_service_url\":\"https://"
                  - "$.spec.bridge.jwtServiceHost"
                  - "\"},\"default_server_config\":{\"m.homeserver\":{\"base_url\":\"https://"
                  - "$.spec.host"
                  - "\",\"server_name\":\""
                  - "$.spec.bridge.wellknownHost"
                  - "\"}}}"
      target:
        apiGroup: ""
        kind: ConfigMap
        type: Updater

    # --- ELEMENT CALL DEPLOYMENT ---
    - name: element-call-deployment
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: element-call
              namespace: "$.metadata.namespace"
              labels:
                app: element-call
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/component: element-call
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              replicas: 1
              selector:
                matchLabels: { app: element-call }
              template:
                metadata:
                  labels:
                    app: element-call
                    matrixrtc.lukacsi.org/stack: "$.spec.stack"
                    matrixrtc.lukacsi.org/component: element-call
                    app.kubernetes.io/managed-by: matrix-rtc-operator
                  annotations:
                    matrixrtc.lukacsi.org/config-hash:
                      "@hash": "$.spec"
                spec:
                  containers:
                    - name: element-call
                      image: "ghcr.io/element-hq/element-call:v0.9.0"
                      ports:
                        - name: http
                          containerPort: 8080
                      resources:
                        requests: { cpu: "50m", memory: "64Mi" }
                        limits: { memory: "256Mi" }
                      volumeMounts:
                        - name: config
                          mountPath: /app/config.json
                          subPath: config.json
                          readOnly: true
                  volumes:
                    - name: config
                      configMap:
                        name: element-call-config
      target:
        apiGroup: apps
        kind: Deployment
        type: Updater

    # --- ELEMENT CALL SERVICE ---
    - name: element-call-service
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: v1
            kind: Service
            metadata:
              name: element-call
              namespace: "$.metadata.namespace"
              labels:
                app: element-call
                matrixrtc.lukacsi.org/component: element-call
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              selector: { app: element-call }
              ports:
                - name: http
                  port: 80
                  targetPort: 8080
      target:
        apiGroup: ""
        kind: Service
        type: Updater

    # --- ELEMENT CALL HTTPRoute ---
    - name: element-call-httproute
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: element-call
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/component: element-call-http
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              parentRefs:
                - name: "$.spec.httpGatewayRef.name"
                  namespace: "$.spec.httpGatewayRef.namespace"
              hostnames:
                - "@concat":
                    - "call."
                    - "$.spec.bridge.wellknownHost"
              rules:
                - backendRefs:
                    - name: element-call
                      port: 80
      target:
        apiGroup: gateway.networking.k8s.io
        kind: HTTPRoute
        type: Updater

    # =====================================================================
    # Cinny — Discord-like Matrix client with MatrixRTC support
    # Deployed at chat.<domain>. Conditional on clients.cinny.enabled.
    # =====================================================================

    # --- CINNY CONFIG ---
    - name: cinny-config-generator
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixServerView
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@join":
            "@and":
              - "@eq": ["$.MatrixServerView.metadata.name", "$.MatrixNetworkingView.metadata.name"]
              - "@eq": ["$.MatrixServerView.metadata.namespace", "$.MatrixNetworkingView.metadata.namespace"]
        - "@select":
            "@eq": ["$.MatrixNetworkingView.spec.clients.cinny.enabled", true]
        - "@project":
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: cinny-config
              namespace: "$.MatrixNetworkingView.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/stack: "$.MatrixNetworkingView.spec.stack"
                matrixrtc.lukacsi.org/component: cinny
                app.kubernetes.io/managed-by: matrix-rtc-operator
            data:
              config.json:
                "@concat":
                  - "{\"defaultHomeserver\":0,\"homeserverList\":[\"https://"
                  - "$.MatrixNetworkingView.spec.host"
                  - "\"],\"allowCustomHomeservers\":false}"
      target:
        apiGroup: ""
        kind: ConfigMap
        type: Updater

    # --- CINNY DEPLOYMENT ---
    - name: cinny-deployment
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.cinny.enabled", true]
        - "@project":
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: cinny
              namespace: "$.metadata.namespace"
              labels:
                app: cinny
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/component: cinny
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              selector:
                matchLabels: { app: cinny }
              template:
                metadata:
                  labels:
                    app: cinny
                    matrixrtc.lukacsi.org/stack: "$.spec.stack"
                    matrixrtc.lukacsi.org/component: cinny
                    app.kubernetes.io/managed-by: matrix-rtc-operator
                  annotations:
                    matrixrtc.lukacsi.org/config-hash:
                      "@hash": "$.spec"
                spec:
                  containers:
                    - name: cinny
                      image: "$.spec.clients.cinny.image"
                      ports:
                        - name: http
                          containerPort: 80
                      resources: "$.spec.clients.cinny.resources"
                      volumeMounts:
                        - name: config
                          mountPath: /app/config.json
                          subPath: config.json
                          readOnly: true
                  volumes:
                    - name: config
                      configMap:
                        name: cinny-config
      target:
        apiGroup: apps
        kind: Deployment
        type: Updater

    # --- CINNY SERVICE ---
    - name: cinny-service
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.cinny.enabled", true]
        - "@project":
            apiVersion: v1
            kind: Service
            metadata:
              name: cinny
              namespace: "$.metadata.namespace"
              labels:
                app: cinny
                matrixrtc.lukacsi.org/component: cinny
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              selector: { app: cinny }
              ports:
                - name: http
                  port: 80
                  targetPort: 80
      target:
        apiGroup: ""
        kind: Service
        type: Updater

    # --- CINNY HTTPRoute ---
    - name: cinny-httproute
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.cinny.enabled", true]
        - "@project":
            apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: cinny
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/component: cinny-http
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              parentRefs:
                - name: "$.spec.httpGatewayRef.name"
                  namespace: "$.spec.httpGatewayRef.namespace"
              hostnames: ["$.spec.clients.cinny.host"]
              rules:
                - backendRefs:
                    - name: cinny
                      port: 80
      target:
        apiGroup: gateway.networking.k8s.io
        kind: HTTPRoute
        type: Updater
