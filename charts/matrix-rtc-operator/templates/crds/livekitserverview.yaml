{{- if .Values.crds.create }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: livekitserverviews.lukacsi.org
  labels:
    app.kubernetes.io/managed-by: matrix-rtc-operator
  annotations:
    "helm.sh/resource-policy": keep
    argocd.argoproj.io/sync-wave: "-1"
spec:
  group: lukacsi.org
  scope: Namespaced
  names:
    kind: LiveKitServerView
    plural: livekitserverviews
    singular: livekitserverview
    shortNames: ["lksv"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Image
          type: string
          jsonPath: .spec.livekit.image
        - name: Redis
          type: boolean
          jsonPath: .status.redis.ready
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                stack: { type: string }
                livekit:
                  type: object
                  properties:
                    image: { type: string }
                    keys:
                      type: object
                      properties:
                        existingSecret: { type: string }
                        apiKeyKey: { type: string }
                        apiSecretKey: { type: string }
                    resources:
                      type: object
                      properties:
                        requests: { type: object, x-kubernetes-preserve-unknown-fields: true }
                        limits: { type: object, x-kubernetes-preserve-unknown-fields: true }
                    ingress:
                      type: object
                      properties:
                        image: { type: string }
                        enabled: { type: boolean }
                        resources:
                          type: object
                          properties:
                            requests: { type: object, x-kubernetes-preserve-unknown-fields: true }
                            limits: { type: object, x-kubernetes-preserve-unknown-fields: true }
                redis:
                  type: object
                  properties:
                    mode: { type: string }
                    image: { type: string }
                    resources:
                      type: object
                      properties:
                        requests: { type: object, x-kubernetes-preserve-unknown-fields: true }
                        limits: { type: object, x-kubernetes-preserve-unknown-fields: true }
                    port: { type: integer }
                    keys:
                      type: object
                      properties:
                        existingSecret: { type: string }
                        passwordKey: { type: string }
                stunnerKeys:
                  type: object
                  properties:
                    existingSecret: { type: string }
                    usernameKey: { type: string }
                    passwordKey: { type: string }
            status:
              type: object
              properties:
                redis:
                  type: object
                  properties:
                    ready: { type: boolean }
                    message: { type: string }
                replicas: { type: integer }
                updatedReplicas: { type: integer }
                availableReplicas: { type: integer }
                readyReplicas: { type: integer }
                serviceName: { type: string }
                ingress:
                  type: object
                  properties:
                    replicas: { type: integer }
                    readyReplicas: { type: integer }
                    conditions:
                      type: array
                      items: { type: object, x-kubernetes-preserve-unknown-fields: true }
                conditions:
                  type: array
                  items: { type: object, x-kubernetes-preserve-unknown-fields: true }
{{- end }}
