# RBAC for dcontroller to manage STUNner and Gateway API resources
# dcontroller's default ClusterRole doesn't include third-party CRDs
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: matrix-rtc-operator-stunner
  labels:
    app.kubernetes.io/managed-by: matrix-rtc-operator
rules:
  - apiGroups: ["stunner.l7mp.io"]
    resources: ["udproutes", "gatewayconfigs"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["gatewayclasses", "gateways"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: matrix-rtc-operator-stunner
  labels:
    app.kubernetes.io/managed-by: matrix-rtc-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: matrix-rtc-operator-stunner
subjects:
  - kind: ServiceAccount
    name: dcontroller-account
    namespace: dcontroller-system
