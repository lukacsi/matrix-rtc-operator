{{- if .Values.crds.create }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: matrixnetworkingviews.lukacsi.org
  labels:
    app.kubernetes.io/managed-by: matrix-rtc-operator
  annotations:
    "helm.sh/resource-policy": keep
    argocd.argoproj.io/sync-wave: "-1"
spec:
  group: lukacsi.org
  scope: Namespaced
  names:
    kind: MatrixNetworkingView
    plural: matrixnetworkingviews
    singular: matrixnetworkingview
    shortNames: ["mxnv"]
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Host
          type: string
          jsonPath: .spec.host
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                stack: { type: string }
                host: { type: string }
                httpGatewayRef:
                  type: object
                  properties:
                    name: { type: string }
                    namespace: { type: string }
                clients:
                  type: object
                  properties:
                    element:
                      type: object
                      properties:
                        enabled: { type: boolean }
                        image: { type: string }
                        replicas: { type: integer }
                        resources:
                          type: object
                          properties:
                            requests: { type: object, x-kubernetes-preserve-unknown-fields: true }
                            limits: { type: object, x-kubernetes-preserve-unknown-fields: true }
                        host: { type: string }
                    cinny:
                      type: object
                      properties:
                        enabled: { type: boolean }
                        image: { type: string }
                        replicas: { type: integer }
                        resources:
                          type: object
                          properties:
                            requests: { type: object, x-kubernetes-preserve-unknown-fields: true }
                            limits: { type: object, x-kubernetes-preserve-unknown-fields: true }
                        host: { type: string }
                bridge:
                  type: object
                  properties:
                    jwtServiceHost: { type: string, description: "Hostname for lk-jwt-service (e.g., lk-jwt.lukacsi.org)" }
                    wellknownHost: { type: string, description: "Hostname for .well-known endpoint (e.g., lukacsi.org)" }
            status:
              type: object
              properties:
                httpRouteReady: { type: boolean }
                clients:
                  type: object
                  properties:
                    element:
                      type: object
                      properties:
                        ready: { type: boolean }
                        replicas: { type: integer }
                        readyReplicas: { type: integer }
                    cinny:
                      type: object
                      properties:
                        ready: { type: boolean }
                        replicas: { type: integer }
                        readyReplicas: { type: integer }
                conditions:
                  type: array
                  items: { type: object, x-kubernetes-preserve-unknown-fields: true }
{{- end }}
