# Base secrets — platform-level credentials referenced by RTCInfrastructure
# In production, encrypt with SOPS/age or use sealed-secrets
---
# STUNner default TURN credentials
# Referenced by RTCInfrastructure.spec.stunner.defaultKeyRef
# Stacks that don't override keys will use these
apiVersion: v1
kind: Secret
metadata:
  name: stunner-auth
  namespace: stunner
type: Opaque
stringData:
  stunner-username: "user-1"
  stunner-password: "pass-1"

---
# (Optional) Cloudflare API token — only needed when certmanager=enabled
# Referenced by RTCInfrastructure.spec.certManager.cloudflareSecretRef
# If you BYO cert-manager (certmanager=disabled), you don't need this.
# apiVersion: v1
# kind: Secret
# metadata:
#   name: cloudflare-api-token
#   namespace: cert-manager
# type: Opaque
# stringData:
#   api-token: "your-cloudflare-api-token-here"
