apiVersion: dcontroller.io/v1alpha1
kind: Operator
metadata:
  name: matrixrtc-matrix-views-to-k8s
  labels:
    matrixrtc.lukacsi.org/component: operator
    matrixrtc.lukacsi.org/role: matrix-materializer
spec:
  controllers:
    # --- SYNAPSE CONFIG (homeserver.yaml via @yaml) ---
    # 3-source join: ServerView + NetworkingView + DB Secret.
    # DB credentials embedded directly from Secret.data (DecodeSecretData).
    # For managed DB: fires after CNPG creates the app secret (natural sequencing).
    # For external DB: fires immediately since user-provided secret already exists.
    #
    # Base config is one @yaml dict; the optional OIDC block is emitted as a
    # second YAML document appended via @concat + @cond, so top-level keys
    # merge naturally when absent. registration_shared_secret reuses the DB
    # password (CNPG-generated, 64 chars) because dcontroller can't join two
    # Secrets of the same kind in one pipeline ($.Secret disambiguation
    # isn't supported).
    - name: synapse-config-generator
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixServerView
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
        - apiGroup: ""
          kind: Secret
      pipeline:
        - "@join":
            "@and":
              - "@eq": ["$.MatrixServerView.metadata.name", "$.MatrixNetworkingView.metadata.name"]
              - "@eq": ["$.MatrixServerView.metadata.namespace", "$.MatrixNetworkingView.metadata.namespace"]
              - "@eq": ["$.MatrixServerView.spec.database.effectiveSecretName", "$.Secret.metadata.name"]
              - "@eq": ["$.MatrixServerView.metadata.namespace", "$.Secret.metadata.namespace"]
        - "@project":
            apiVersion: v1
            kind: Secret
            metadata:
              name: synapse-config
              namespace: "$.MatrixServerView.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/stack: "$.MatrixServerView.spec.stack"
                matrixrtc.lukacsi.org/component: synapse
                matrixrtc.lukacsi.org/view: "$.MatrixServerView.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            stringData:
              homeserver.yaml:
                "@concat":
                  - "@yaml":
                      server_name: "$.MatrixServerView.spec.synapse.serverName"
                      public_baseurl:
                        "@concat": ["https://", "$.MatrixNetworkingView.spec.host"]
                      signing_key_path:
                        "@concat": ["/data/keys/", "$.MatrixServerView.spec.synapse.signingKey.signingKeyKey"]
                      listeners:
                        - port: 8008
                          type: http
                          tls: false
                          x_forwarded: true
                          resources:
                            - names: ["client", "federation"]
                              compress: false
                      database:
                        name: psycopg2
                        args:
                          user: "$.Secret.data['username']"
                          password: "$.Secret.data['password']"
                          database: "$.MatrixServerView.spec.database.effectiveName"
                          host: "$.MatrixServerView.spec.database.effectiveHost"
                          port:
                            "@int": "$.MatrixServerView.spec.database.effectivePort"
                          cp_min: 5
                          cp_max: 10
                      media_store_path: "/data/media_store"
                      uploads_path: "/data/uploads"
                      enable_registration: false
                      registration_shared_secret: "$.Secret.data['password']"
                      report_stats: false
                      # Rate limiting — relaxed for personal/small homeserver
                      rc_joins:
                        local: { per_second: 50, burst_count: 100 }
                        remote: { per_second: 50, burst_count: 100 }
                      rc_message: { per_second: 100, burst_count: 200 }
                      rc_registration: { per_second: 50, burst_count: 100 }
                      # MatrixRTC — serve well-known with LiveKit foci for Element Call
                      serve_client_wellknown: true
                      extra_well_known_client_content:
                        "org.matrix.msc4143.rtc_foci":
                          - type: livekit
                            livekit_service_url:
                              "@concat": ["https://", "$.MatrixNetworkingView.spec.bridge.jwtServiceHost"]
                  - "@cond":
                      - "@eq": ["$.MatrixServerView.spec.synapse.oidc.enabled", true]
                      - "@yaml":
                          oidc_providers:
                            - idp_id:
                                "@definedOr": ["$.MatrixServerView.spec.synapse.oidc.idpId", "authentik"]
                              idp_name:
                                "@definedOr": ["$.MatrixServerView.spec.synapse.oidc.idpName", "Authentik"]
                              discover: true
                              issuer: "$.MatrixServerView.spec.synapse.oidc.issuer"
                              client_id: "$.MatrixServerView.spec.synapse.oidc.clientId"
                              client_secret_path: "/secrets/oidc/client-secret"
                              scopes: ["openid", "profile", "email"]
                              user_mapping_provider:
                                config:
                                  localpart_template:
                                    "@definedOr": ["$.MatrixServerView.spec.synapse.oidc.userMapping.localpartTemplate", "{{`{{ user.preferred_username }}`}}"]
                                  display_name_template:
                                    "@definedOr": ["$.MatrixServerView.spec.synapse.oidc.userMapping.displayNameTemplate", "{{`{{ user.name }}`}}"]
                      - ""
      targets:
        - apiGroup: ""
          kind: Secret
          type: Updater

    # --- SYNAPSE DATA PVC ---
    # Persistent storage for media_store and uploads. PVC is immutable after
    # creation — Updater creates once, subsequent reconciliations are no-ops.
    - name: synapse-data-pvc
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixServerView
          predicate: GenerationChanged
      pipeline:
        - "@project":
            apiVersion: v1
            kind: PersistentVolumeClaim
            metadata:
              name: synapse-data
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/component: synapse
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              accessModes: ["ReadWriteOnce"]
              # Pin the storageClass explicitly — defaulting to the cluster
              # default often means node-pinned classes (local-path) which
              # block autoscaler scale-up and node drain (volume node affinity
              # conflict). Set spec.synapse.storage.storageClass on the
              # MatrixRTCStack CR to override. Operator default assumes a
              # movable NFS/CSI class named "ssd-nfs"; override via values /
              # stack spec in environments where that name differs.
              storageClassName:
                "@definedOr":
                  - "$.spec.synapse.storage.storageClass"
                  - "ssd-nfs"
              resources:
                requests:
                  storage:
                    "@definedOr":
                      - "$.spec.synapse.storage.size"
                      - "10Gi"
      targets:
        - apiGroup: ""
          kind: PersistentVolumeClaim
          type: Updater

    # --- SYNAPSE DEPLOYMENT ---
    # Joins ServerView + config Secret for @hash rollout trigger.
    - name: server-view-to-synapse-deployment
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixServerView
        - apiGroup: ""
          kind: Secret
      pipeline:
        - "@join":
            "@and":
              - "@eq": ["synapse-config", "$.Secret.metadata.name"]
              - "@eq": ["$.MatrixServerView.metadata.namespace", "$.Secret.metadata.namespace"]
        - "@project":
            apiVersion: "apps/v1"
            kind: "Deployment"
            metadata:
              name: "synapse"
              namespace: "$.MatrixServerView.metadata.namespace"
              labels:
                app: "synapse"
                matrixrtc.lukacsi.org/stack: "$.MatrixServerView.spec.stack"
                matrixrtc.lukacsi.org/component: synapse
                matrixrtc.lukacsi.org/view: "$.MatrixServerView.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              replicas:
                "@definedOr": ["$.MatrixServerView.spec.synapse.replicas", 1]
              selector:
                matchLabels: { app: "synapse" }
              template:
                metadata:
                  labels:
                    app: "synapse"
                    matrixrtc.lukacsi.org/stack: "$.MatrixServerView.spec.stack"
                    matrixrtc.lukacsi.org/component: synapse
                    matrixrtc.lukacsi.org/view: "$.MatrixServerView.metadata.name"
                    app.kubernetes.io/managed-by: matrix-rtc-operator
                  annotations:
                    matrixrtc.lukacsi.org/config-hash:
                      "@hash": "$.Secret.data"
                spec:
                  # Init container: discovers appservice registration files
                  # and generates a supplementary Synapse config listing them.
                  # Runs always — produces empty config ({}) when no appservices.
                  initContainers:
                    - name: appservice-discovery
                      image: "busybox:1.37"
                      command: ["/bin/sh", "-c"]
                      args:
                        - "if ls /appservices/*.yaml 1>/dev/null 2>&1; then echo 'app_service_config_files:' > /config-extra/appservices.yaml; for f in /appservices/*.yaml; do echo \"  - $f\" >> /config-extra/appservices.yaml; done; else echo '{}' > /config-extra/appservices.yaml; fi"
                      volumeMounts:
                        - name: appservices
                          mountPath: /appservices
                          readOnly: true
                        - name: config-extra
                          mountPath: /config-extra
                  containers:
                    - name: synapse
                      image: "$.MatrixServerView.spec.synapse.image"
                      # Bypass /start.py — load main config + appservice config
                      command: ["python", "-m", "synapse.app.homeserver"]
                      args: ["--config-path", "/config/homeserver.yaml", "--config-path", "/config-extra/appservices.yaml"]
                      ports:
                        - name: http
                          containerPort: 8008
                      resources: "$.MatrixServerView.spec.synapse.resources"
                      livenessProbe:
                        httpGet:
                          path: /health
                          port: 8008
                        initialDelaySeconds: 30
                        periodSeconds: 30
                        timeoutSeconds: 10
                      readinessProbe:
                        httpGet:
                          path: /health
                          port: 8008
                        initialDelaySeconds: 5
                        periodSeconds: 10
                        timeoutSeconds: 5
                      volumeMounts:
                        - name: config
                          mountPath: /config
                          readOnly: true
                        - name: signing-key
                          mountPath: /data/keys
                          readOnly: true
                        - name: data
                          mountPath: /data
                        - name: oidc-secret
                          mountPath: /secrets/oidc
                          readOnly: true
                        - name: appservices
                          mountPath: /appservices
                          readOnly: true
                        - name: config-extra
                          mountPath: /config-extra
                          readOnly: true
                  volumes:
                    - name: config
                      secret:
                        secretName: "synapse-config"
                    - name: signing-key
                      secret:
                        secretName: "$.MatrixServerView.spec.synapse.signingKey.existingSecret"
                    - name: data
                      persistentVolumeClaim:
                        claimName: synapse-data
                    - name: oidc-secret
                      secret:
                        secretName:
                          "@definedOr":
                            - "$.MatrixServerView.spec.synapse.oidc.clientSecret.existingSecret"
                            - "synapse-oidc-unused"
                        optional: true
                    - name: appservices
                      secret:
                        secretName:
                          "@definedOr":
                            - "$.MatrixServerView.spec.synapse.appservices.registrationsSecret"
                            - "synapse-appservice-registrations-unused"
                        optional: true
                    - name: config-extra
                      emptyDir: {}
      targets:
        - apiGroup: "apps"
          kind: "Deployment"
          type: Updater

    # --- CNPG CLUSTER (managed database only) ---
    - name: server-view-to-cnpg-cluster
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixServerView
          predicate: GenerationChanged
      pipeline:
        - "@select":
            "@eq": ["$.spec.database.mode", "managed"]
        - "@project":
            apiVersion: "postgresql.cnpg.io/v1"
            kind: "Cluster"
            metadata:
              name:
                "@concat": ["$.spec.stack", "-db"]
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/component: database
                matrixrtc.lukacsi.org/view: "$.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              instances:
                "@definedOr": ["$.spec.database.instances", 1]
              # Single-instance PDB blocks node drain (allowedDisruptions: 0).
              # Disable explicitly for single-instance; override in the stack
              # spec if you run instances >= 3.
              enablePDB:
                "@definedOr": ["$.spec.database.enablePDB", false]
              storage:
                size:
                  "@definedOr": ["$.spec.database.storage.size", "10Gi"]
                storageClass:
                  "@definedOr":
                    - "$.spec.database.storage.storageClass"
                    - "ssd-nfs"
              bootstrap:
                initdb:
                  database:
                    "@definedOr": ["$.spec.database.effectiveName", "synapse"]
                  owner: synapse
      targets:
        - apiGroup: "postgresql.cnpg.io"
          kind: "Cluster"
          type: Updater

    # --- SYNAPSE SERVICE ---
    - name: networking-view-to-synapse-svc
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
          predicate: GenerationChanged
      pipeline:
        - "@project":
            apiVersion: "v1"
            kind: "Service"
            metadata:
              name: "synapse"
              namespace: "$.metadata.namespace"
              labels:
                app: "synapse"
                matrixrtc.lukacsi.org/component: synapse
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/view: "$.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              selector: { app: "synapse" }
              ports:
                - name: http
                  port: 8008
                  targetPort: 8008
      targets:
        - apiGroup: ""
          kind: "Service"
          type: Updater

    # --- SYNAPSE HTTPRoute ---
    - name: networking-view-to-synapse-httproute
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
          predicate: GenerationChanged
      pipeline:
        - "@project":
            apiVersion: gateway.networking.k8s.io/v1
            kind: "HTTPRoute"
            metadata:
              name: synapse
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/component: synapse-http
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/view: "$.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              parentRefs:
                - name: "$.spec.httpGatewayRef.name"
                  namespace: "$.spec.httpGatewayRef.namespace"
              hostnames: ["$.spec.host"]
              rules:
                - backendRefs:
                    - name: synapse
                      port: 8008
      targets:
        - apiGroup: gateway.networking.k8s.io
          kind: "HTTPRoute"
          type: Updater

    # --- ELEMENT WEB CONFIG (config.json via @concat) ---
    # 2-source join: ServerView (serverName) + NetworkingView (host, clients).
    # Conditional on clients.element.enabled.
    - name: element-config-generator
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixServerView
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@join":
            "@and":
              - "@eq": ["$.MatrixServerView.metadata.name", "$.MatrixNetworkingView.metadata.name"]
              - "@eq": ["$.MatrixServerView.metadata.namespace", "$.MatrixNetworkingView.metadata.namespace"]
        - "@select":
            "@eq": ["$.MatrixNetworkingView.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: element-config
              namespace: "$.MatrixNetworkingView.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/stack: "$.MatrixNetworkingView.spec.stack"
                matrixrtc.lukacsi.org/component: element
                matrixrtc.lukacsi.org/view: "$.MatrixNetworkingView.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            data:
              config.json:
                "@json":
                  default_server_config:
                    "m.homeserver":
                      base_url:
                        "@concat": ["https://", "$.MatrixNetworkingView.spec.host"]
                      server_name: "$.MatrixServerView.spec.synapse.serverName"
                  element_call:
                    url:
                      "@concat": ["https://call.", "$.MatrixNetworkingView.spec.bridge.wellknownHost"]
                    use_exclusively: true
                  brand: "Element"
                  disable_custom_urls: true
                  disable_guests: true
                  features:
                    feature_group_calls: true
                    feature_video_rooms: true
                    feature_element_call_video_rooms: true
      targets:
        - apiGroup: ""
          kind: ConfigMap
          type: Updater

    # --- ELEMENT WEB DEPLOYMENT ---
    # Single source: NetworkingView. @hash on spec triggers rollout when config changes.
    - name: element-deployment
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: element-web
              namespace: "$.metadata.namespace"
              labels:
                app: element-web
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/component: element
                matrixrtc.lukacsi.org/view: "$.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              replicas:
                "@definedOr": ["$.spec.clients.element.replicas", 1]
              selector:
                matchLabels: { app: element-web }
              template:
                metadata:
                  labels:
                    app: element-web
                    matrixrtc.lukacsi.org/stack: "$.spec.stack"
                    matrixrtc.lukacsi.org/component: element
                    matrixrtc.lukacsi.org/view: "$.metadata.name"
                    app.kubernetes.io/managed-by: matrix-rtc-operator
                  annotations:
                    matrixrtc.lukacsi.org/config-hash:
                      "@hash": "$.spec"
                spec:
                  containers:
                    - name: element
                      image: "$.spec.clients.element.image"
                      ports:
                        - name: http
                          containerPort: 80
                      resources: "$.spec.clients.element.resources"
                      volumeMounts:
                        - name: config
                          mountPath: /app/config.json
                          subPath: config.json
                          readOnly: true
                  volumes:
                    - name: config
                      configMap:
                        name: element-config
      targets:
        - apiGroup: apps
          kind: Deployment
          type: Updater

    # --- ELEMENT WEB SERVICE ---
    - name: element-service
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: v1
            kind: Service
            metadata:
              name: element-web
              namespace: "$.metadata.namespace"
              labels:
                app: element-web
                matrixrtc.lukacsi.org/component: element
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/view: "$.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              selector: { app: element-web }
              ports:
                - name: http
                  port: 80
                  targetPort: 80
      targets:
        - apiGroup: ""
          kind: Service
          type: Updater

    # --- ELEMENT WEB HTTPRoute ---
    - name: element-httproute
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: element
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/component: element-http
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/view: "$.metadata.name"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              parentRefs:
                - name: "$.spec.httpGatewayRef.name"
                  namespace: "$.spec.httpGatewayRef.namespace"
              hostnames: ["$.spec.clients.element.host"]
              rules:
                - backendRefs:
                    - name: element-web
                      port: 80
      targets:
        - apiGroup: gateway.networking.k8s.io
          kind: HTTPRoute
          type: Updater

    # =====================================================================
    # Element Call — self-hosted Element Call widget for MatrixRTC
    # Deployed at call.<domain>. Element Web embeds this as an iframe.
    # =====================================================================

    # --- ELEMENT CALL CONFIG ---
    - name: element-call-config
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: element-call-config
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/component: element-call
                app.kubernetes.io/managed-by: matrix-rtc-operator
            data:
              config.json:
                "@json":
                  livekit:
                    livekit_service_url:
                      "@concat": ["https://", "$.spec.bridge.jwtServiceHost"]
                  default_server_config:
                    "m.homeserver":
                      base_url:
                        "@concat": ["https://", "$.spec.host"]
                      server_name: "$.spec.bridge.wellknownHost"
      targets:
        - apiGroup: ""
          kind: ConfigMap
          type: Updater

    # --- ELEMENT CALL DEPLOYMENT ---
    - name: element-call-deployment
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: element-call
              namespace: "$.metadata.namespace"
              labels:
                app: element-call
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/component: element-call
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              replicas: 1
              selector:
                matchLabels: { app: element-call }
              template:
                metadata:
                  labels:
                    app: element-call
                    matrixrtc.lukacsi.org/stack: "$.spec.stack"
                    matrixrtc.lukacsi.org/component: element-call
                    app.kubernetes.io/managed-by: matrix-rtc-operator
                  annotations:
                    matrixrtc.lukacsi.org/config-hash:
                      "@hash": "$.spec"
                spec:
                  containers:
                    - name: element-call
                      image: "ghcr.io/element-hq/element-call:v0.9.0"
                      ports:
                        - name: http
                          containerPort: 8080
                      resources:
                        requests: { cpu: "50m", memory: "64Mi" }
                        limits: { memory: "256Mi" }
                      volumeMounts:
                        - name: config
                          mountPath: /app/config.json
                          subPath: config.json
                          readOnly: true
                  volumes:
                    - name: config
                      configMap:
                        name: element-call-config
      targets:
        - apiGroup: apps
          kind: Deployment
          type: Updater

    # --- ELEMENT CALL SERVICE ---
    - name: element-call-service
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: v1
            kind: Service
            metadata:
              name: element-call
              namespace: "$.metadata.namespace"
              labels:
                app: element-call
                matrixrtc.lukacsi.org/component: element-call
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              selector: { app: element-call }
              ports:
                - name: http
                  port: 80
                  targetPort: 8080
      targets:
        - apiGroup: ""
          kind: Service
          type: Updater

    # --- ELEMENT CALL HTTPRoute ---
    - name: element-call-httproute
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.element.enabled", true]
        - "@project":
            apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: element-call
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/component: element-call-http
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              parentRefs:
                - name: "$.spec.httpGatewayRef.name"
                  namespace: "$.spec.httpGatewayRef.namespace"
              hostnames:
                - "@concat":
                    - "call."
                    - "$.spec.bridge.wellknownHost"
              rules:
                - backendRefs:
                    - name: element-call
                      port: 80
      targets:
        - apiGroup: gateway.networking.k8s.io
          kind: HTTPRoute
          type: Updater

    # =====================================================================
    # Cinny — Discord-like Matrix client with MatrixRTC support
    # Deployed at chat.<domain>. Conditional on clients.cinny.enabled.
    # =====================================================================

    # --- CINNY CONFIG ---
    - name: cinny-config-generator
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixServerView
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@join":
            "@and":
              - "@eq": ["$.MatrixServerView.metadata.name", "$.MatrixNetworkingView.metadata.name"]
              - "@eq": ["$.MatrixServerView.metadata.namespace", "$.MatrixNetworkingView.metadata.namespace"]
        - "@select":
            "@eq": ["$.MatrixNetworkingView.spec.clients.cinny.enabled", true]
        - "@project":
            apiVersion: v1
            kind: ConfigMap
            metadata:
              name: cinny-config
              namespace: "$.MatrixNetworkingView.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/stack: "$.MatrixNetworkingView.spec.stack"
                matrixrtc.lukacsi.org/component: cinny
                app.kubernetes.io/managed-by: matrix-rtc-operator
            data:
              config.json:
                "@json":
                  defaultHomeserver: 0
                  homeserverList:
                    - "@concat": ["https://", "$.MatrixNetworkingView.spec.host"]
                  allowCustomHomeservers: false
      targets:
        - apiGroup: ""
          kind: ConfigMap
          type: Updater

    # --- CINNY DEPLOYMENT ---
    - name: cinny-deployment
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.cinny.enabled", true]
        - "@project":
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: cinny
              namespace: "$.metadata.namespace"
              labels:
                app: cinny
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                matrixrtc.lukacsi.org/component: cinny
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              selector:
                matchLabels: { app: cinny }
              template:
                metadata:
                  labels:
                    app: cinny
                    matrixrtc.lukacsi.org/stack: "$.spec.stack"
                    matrixrtc.lukacsi.org/component: cinny
                    app.kubernetes.io/managed-by: matrix-rtc-operator
                  annotations:
                    matrixrtc.lukacsi.org/config-hash:
                      "@hash": "$.spec"
                spec:
                  containers:
                    - name: cinny
                      image: "$.spec.clients.cinny.image"
                      ports:
                        - name: http
                          containerPort: 80
                      resources: "$.spec.clients.cinny.resources"
                      volumeMounts:
                        - name: config
                          mountPath: /app/config.json
                          subPath: config.json
                          readOnly: true
                  volumes:
                    - name: config
                      configMap:
                        name: cinny-config
      targets:
        - apiGroup: apps
          kind: Deployment
          type: Updater

    # --- CINNY SERVICE ---
    - name: cinny-service
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.cinny.enabled", true]
        - "@project":
            apiVersion: v1
            kind: Service
            metadata:
              name: cinny
              namespace: "$.metadata.namespace"
              labels:
                app: cinny
                matrixrtc.lukacsi.org/component: cinny
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              selector: { app: cinny }
              ports:
                - name: http
                  port: 80
                  targetPort: 80
      targets:
        - apiGroup: ""
          kind: Service
          type: Updater

    # --- CINNY HTTPRoute ---
    - name: cinny-httproute
      sources:
        - apiGroup: lukacsi.org
          kind: MatrixNetworkingView
      pipeline:
        - "@select":
            "@eq": ["$.spec.clients.cinny.enabled", true]
        - "@project":
            apiVersion: gateway.networking.k8s.io/v1
            kind: HTTPRoute
            metadata:
              name: cinny
              namespace: "$.metadata.namespace"
              labels:
                matrixrtc.lukacsi.org/component: cinny-http
                matrixrtc.lukacsi.org/stack: "$.spec.stack"
                app.kubernetes.io/managed-by: matrix-rtc-operator
            spec:
              parentRefs:
                - name: "$.spec.httpGatewayRef.name"
                  namespace: "$.spec.httpGatewayRef.namespace"
              hostnames: ["$.spec.clients.cinny.host"]
              rules:
                - backendRefs:
                    - name: cinny
                      port: 80
      targets:
        - apiGroup: gateway.networking.k8s.io
          kind: HTTPRoute
          type: Updater
